services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-online_ssh}
      POSTGRES_USER: ${POSTGRES_USER:-online_ssh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-online_ssh}
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      HTTP_ADDR: :8080
      AUTO_MIGRATE: "true"
      MIGRATIONS_DIR: /app/migrations
      STATIC_DIR: /app/web
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-online_ssh}:${POSTGRES_PASSWORD:-online_ssh}@postgres:5432/${POSTGRES_DB:-online_ssh}?sslmode=disable}
      CREDENTIAL_MASTER_KEY: ${CREDENTIAL_MASTER_KEY:-change-me-for-production-32-byte-minimum}
      ALLOW_USER_REGISTRATION: ${ALLOW_USER_REGISTRATION:-true}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-online_ssh_session}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-online_ssh_refresh}
    ports:
      - "${ONLINE_SSH_BIND_HOST:-127.0.0.1}:${ONLINE_SSH_HTTP_PORT:-8080}:8080"
