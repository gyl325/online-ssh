          $ref: '#/components/schemas/TerminalWebSocketInfo'
        connection_log:
          type: array
          nullable: true
          description: 后端在终端 bootstrap 阶段采集的 SSH 连接阶段日志；快速连接 REST 阶段可能为空，真实 SSH 错误会在 WebSocket attach 阶段返回。
          items:
            $ref: '#/components/schemas/TerminalConnectionLogEntry'

    TerminalSession:
      type: object
      required: [id, host_id, status, started_at]
      properties:
        id:
          type: string
          description: 持久终端会话为 UUID；不保存资源的快速连接会话使用 `tmp-session-*` 临时 ID。
        host_id:
          type: string
          description: 持久主机为 UUID；临时快速连接主机使用 `tmp-host-*`，只在当前后端进程有效。
        status:
          type: string
          enum: [connecting, connected, disconnected, failed]
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
          nullable: true
        attached:
          type: boolean
          nullable: true
          description: 当前服务进程内 runtime 是否有 WebSocket attached；若服务重启或 runtime 不存在则可能为空
        detached_at:
          type: string
          format: date-time
          nullable: true
          description: 最近一次 WebSocket detach 的时间
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: detached 后预计自动关闭 runtime 的时间
        keep_alive_until:
          type: string
          format: date-time
          nullable: true
          description: 用户主动开启后台保活后的托管截止时间
        attach_token:
          type: string
          nullable: true
          description: 短生命周期终端 WebSocket attach token；仅在当前会话可重新 attach 时返回。

