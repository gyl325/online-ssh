openapi: 3.0.3
info:
  title: Online SSH Platform API
  version: 0.1.0
  description: |
    在线 SSH 平台第一版 API 草案。

    设计目标：
    - 个人版优先
    - 支持密码登录与私钥登录
    - 支持主机管理、远程文件管理、文件上传下载、传输任务、操作审计
    - 终端实时连接通过 WebSocket 实现，OpenAPI 仅描述终端会话初始化接口与相关模型

servers:
  - url: https://api.example.com
    description: Production
  - url: http://localhost:8080
    description: Local development

tags:
  - name: System
  - name: Auth
  - name: Account
  - name: Admin
  - name: Hosts
  - name: Credentials
  - name: Connections
  - name: Files
  - name: Transfers
  - name: Audit
  - name: Terminal

security:
  - cookieAuth: []
  - bearerAuth: []

paths:
  /healthz:
    get:
      tags: [System]
      summary: 健康检查
      operationId: healthz
      security: []
      responses:
        '200':
          description: 服务可用
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [ok]

  /api/auth/config:
    get:
      tags: [Auth]
      summary: 获取公开认证配置
      operationId: getAuthConfig
      security: []
      responses:
        '200':
          description: 公开认证配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthConfigResponse'

  /api/auth/register:
    post:
      tags: [Auth]
      summary: 注册用户
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 注册成功
          headers:
            Set-Cookie:
              description: 注册成功后写入 `online_ssh_session` 与 `online_ssh_refresh` 两个 HttpOnly Cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: 邮箱或用户名已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 服务端已关闭新用户注册
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/email-code/send:
    post:
      tags: [Auth]
      summary: 发送邮箱验证码
      description: |
        `register` purpose 必须传入 `email`，并受新注册邮箱白名单限制。
        `login` purpose 可传入 `identifier`（邮箱或用户名）；服务端只会为已注册且 active 的用户发送验证码，并发送到该账号邮箱。
      operationId: sendAuthEmailVerificationCode
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendEmailVerificationCodeRequest'
      responses:
        '202':
          description: 验证码已发送
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendEmailVerificationCodeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: 邮箱不允许注册、注册关闭或登录账号已禁用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 登录标识不存在或不可登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: 验证码发送过于频繁
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: 登录
      description: 使用邮箱或用户名加密码登录。登录成功后会撤销同一用户其他 active sessions 和 refresh tokens，因此同一账号同一时间只保留最新设备在线。
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功，或密码校验通过但需要继续完成 MFA
          headers:
            Set-Cookie:
              description: 仅完整登录成功时写入 `online_ssh_session` 与 `online_ssh_refresh` 两个 HttpOnly Cookie；`mfa_required` 响应不会写入正式登录 Cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AuthUserResponse'
                  - $ref: '#/components/schemas/MFARequiredResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 账号已禁用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login/email-code:
    post:
      tags: [Auth]
      summary: 使用邮箱验证码登录
      description: 使用邮箱或用户名定位账号，再校验发送到账号邮箱的验证码。登录成功后会撤销同一用户其他 active sessions 和 refresh tokens，因此同一账号同一时间只保留最新设备在线。
      operationId: loginWithEmailCode
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginEmailCodeRequest'
      responses:
        '200':
          description: 登录成功，或邮箱验证码校验通过但需要继续完成 MFA
          headers:
            Set-Cookie:
              description: 仅完整登录成功时写入 `online_ssh_session` 与 `online_ssh_refresh` 两个 HttpOnly Cookie；`mfa_required` 响应不会写入正式登录 Cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AuthUserResponse'
                  - $ref: '#/components/schemas/MFARequiredResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 账号已禁用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/2fa/status:
    get:
      tags: [Auth]
      summary: 获取当前用户 2FA 状态
      operationId: getMFAStatus
      responses:
        '200':
          description: 当前用户 2FA 状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFAStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/2fa/setup:
    post:
      tags: [Auth]
      summary: 开始绑定 TOTP 2FA
      description: 校验当前密码后，为当前用户生成待确认的 TOTP secret、otpauth URL 和二维码。secret 会加密临时保存，确认前不会启用 2FA。
      operationId: setupMFA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFASetupRequest'
      responses:
        '200':
          description: TOTP 绑定信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFASetupResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/auth/2fa/confirm:
    post:
      tags: [Auth]
      summary: 确认启用 TOTP 2FA
      operationId: confirmMFASetup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFACodeRequest'
      responses:
        '200':
          description: 已启用 2FA，并返回只显示一次的恢复码明文
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFARecoveryCodesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/auth/2fa/verify:
    post:
      tags: [Auth]
      summary: 使用 pending MFA token 完成登录
      description: 只接受登录接口返回的短生命周期 `mfa_token`。验证 TOTP 或恢复码成功后才写入正式 session / refresh Cookie。
      operationId: verifyMFA
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFAVerifyRequest'
      responses:
        '200':
          description: MFA 验证成功并完成登录
          headers:
            Set-Cookie:
              description: 写入 `online_ssh_session` 与 `online_ssh_refresh` 两个 HttpOnly Cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/2fa/disable:
    post:
      tags: [Auth]
      summary: 关闭当前用户 2FA
      description: 必须重新验证当前密码，并提供当前 TOTP 验证码或恢复码。成功后清空 TOTP secret 与未使用恢复码。
      operationId: disableMFA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFAAuthenticatedActionRequest'
      responses:
        '204':
          description: 2FA 已关闭
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/2fa/recovery-codes/regenerate:
    post:
      tags: [Auth]
      summary: 重新生成恢复码
      description: 必须重新验证当前密码，并提供当前 TOTP 验证码或恢复码。旧恢复码会全部失效，新恢复码只返回一次。
      operationId: regenerateMFARecoveryCodes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFAAuthenticatedActionRequest'
      responses:
        '200':
          description: 新恢复码，仅显示一次
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFARecoveryCodesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: 登出
      operationId: logout
      responses:
        '204':
          description: 已登出

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: 刷新会话
      description: 使用 HttpOnly refresh cookie 轮换短 session cookie 与 refresh cookie。WebSocket 不接收 refresh token；主终端 WebSocket 还需要短生命周期 attach token。
      operationId: refreshSession
      security: []
      responses:
        '200':
          description: 刷新成功
          headers:
            Set-Cookie:
              description: 重写 `online_ssh_session` 与 `online_ssh_refresh` 两个 HttpOnly Cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/me:
    get:
      tags: [Auth]
      summary: 获取当前用户
      operationId: getCurrentUser
      responses:
        '200':
          description: 当前用户信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/account/email-code/send:
    post:
      tags: [Account]
      summary: 发送账号邮箱换绑验证码
      description: |
        当前邮箱验证码会发送到登录用户现有邮箱；新邮箱验证码需要传入目标新邮箱。
        验证码 purpose 分别为 `email_change_current` 与 `email_change_new`。
      operationId: sendAccountEmailVerificationCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendAccountEmailCodeRequest'
      responses:
        '202':
          description: 验证码已发送
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendEmailVerificationCodeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 新邮箱不在允许范围内
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 新邮箱已被其他账号使用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: 验证码发送过于频繁
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/account/password:
    patch:
      tags: [Account]
      summary: 修改当前用户密码
      description: 修改成功后会撤销当前会话以外的同一用户 sessions 与 refresh tokens。
      operationId: changeAccountPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeAccountPasswordRequest'
      responses:
        '200':
          description: 密码已修改
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeAccountPasswordResponse'
        '400':
          description: 请求无效，或新密码与当前密码相同（PASSWORD_UNCHANGED）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未认证、会话失效或当前密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/account/email:
    patch:
      tags: [Account]
      summary: 换绑当前用户邮箱
      description: 需要同时提交当前邮箱验证码、新邮箱地址和新邮箱验证码。
      operationId: changeAccountEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeAccountEmailRequest'
      responses:
        '200':
          description: 邮箱已换绑
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 新邮箱不在允许范围内
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 新邮箱已被其他账号使用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/account:
    delete:
      tags: [Account]
      summary: 删除当前账号
      description: |
        需要提交当前密码。删除成功后服务端会清理认证 cookie。
        若当前账号是最后一个拥有 `admin.access` 权限的账号，服务端会拒绝删除。
      operationId: deleteAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteAccountRequest'
      responses:
        '204':
          description: 账号已删除
          headers:
            Set-Cookie:
              description: 清理 `online_ssh_session` 与 `online_ssh_refresh` 两个 HttpOnly Cookie
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: 未认证、会话失效或当前密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 当前账号是最后一个拥有管理员入口权限的账号
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/users:
    get:
      tags: [Admin]
      summary: 获取管理员用户列表
      operationId: listAdminUsers
      description: 需要当前用户拥有 `admin.access` 权限。响应包含用户基础信息、认证类型、角色、权限和当前活跃会话数量。
      responses:
        '200':
          description: 用户列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/users/{userId}:
    delete:
      tags: [Admin]
      summary: 删除用户
      operationId: deleteAdminUser
      description: |
        需要 `admin.users.manage` 权限。删除前服务端会拒绝删除当前管理员自己；
        若目标用户是最后一个拥有 `admin.access` 权限的用户，也会拒绝删除。
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: 用户已删除
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/admin/users/{userId}/status:
    patch:
      tags: [Admin]
      summary: 启用或禁用用户
      operationId: updateAdminUserStatus
      description: 需要 `admin.users.manage` 权限。禁用用户时会撤销该用户已有的 active sessions 和 refresh tokens。
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserStatusRequest'
      responses:
        '200':
          description: 用户状态已更新
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserStatusResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/admin/users/{userId}/role:
    patch:
      tags: [Admin]
      summary: 修改用户角色
      operationId: updateAdminUserRole
      description: |
        需要 `admin.users.manage` 权限。角色 key 可来自内置角色或管理员创建的自定义角色；
        服务端会拒绝把当前管理员自己改为其他角色，并保护最后一个拥有 `admin.access` 的用户。
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserRoleRequest'
      responses:
        '200':
          description: 用户角色已更新
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserRoleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/admin/users/{userId}/sessions/revoke:
    post:
      tags: [Admin]
      summary: 踢出指定用户的会话
      operationId: revokeAdminUserSessions
      description: 需要 `admin.sessions.manage` 权限。若目标是当前管理员自己，服务端会保留当前请求所在 session。
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: 已撤销目标用户会话
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRevokedSessionsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/users/{userId}/mfa:
    get:
      tags: [Admin]
      summary: 获取指定用户 2FA 状态
      operationId: getAdminUserMFA
      description: 需要 `admin.users.manage` 权限。
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: 用户 2FA 状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserMFAStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/users/{userId}/mfa/reset:
    post:
      tags: [Admin]
      summary: 重置指定用户 2FA
      operationId: resetAdminUserMFA
      description: 需要 `admin.users.manage` 权限。会清除目标用户 TOTP secret、恢复码和 pending MFA token，并写入审计日志 `admin_mfa_reset`。
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: 目标用户 2FA 已重置
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/roles:
    get:
      tags: [Admin]
      summary: 获取角色与权限定义
      operationId: listAdminRoles
      description: 需要 `admin.access` 权限。响应包含系统角色、自定义角色和前端可配置的权限定义。
      responses:
        '200':
          description: 角色列表与权限定义
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRoleListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Admin]
      summary: 创建自定义角色
      operationId: createAdminRole
      description: 需要 `admin.roles.manage` 权限。角色 key 创建后作为用户 `role` 字段的值参与权限判断。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminRoleInput'
      responses:
        '201':
          description: 角色已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRoleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/admin/roles/{roleKey}:
    patch:
      tags: [Admin]
      summary: 更新角色
      operationId: updateAdminRole
      description: |
        需要 `admin.roles.manage` 权限。系统角色不能被禁用或删除；
        如果角色权限变更会移除最后一个 `admin.access` 持有者，服务端会拒绝。
      parameters:
        - $ref: '#/components/parameters/RoleKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminRoleInput'
      responses:
        '200':
          description: 角色已更新
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRoleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Admin]
      summary: 删除自定义角色
      operationId: deleteAdminRole
      description: 需要 `admin.roles.manage` 权限。系统角色或仍有用户引用的角色不能删除。
      parameters:
        - $ref: '#/components/parameters/RoleKey'
      responses:
        '204':
          description: 角色已删除
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/admin/sessions:
    get:
      tags: [Admin]
      summary: 获取当前活跃会话列表
      operationId: listAdminSessions
      description: 需要 `admin.access` 权限。仅返回未撤销且未过期的 session。
      responses:
        '200':
          description: 活跃会话列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSessionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/sessions/{sessionId}/revoke:
    post:
      tags: [Admin]
      summary: 踢出单个会话
      operationId: revokeAdminSession
      description: 需要 `admin.sessions.manage` 权限。服务端会拒绝撤销当前请求所在 session。
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '204':
          description: 会话已撤销
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/admin/settings/general:
    get:
      tags: [Admin]
      summary: 获取管理员通用配置
      operationId: getAdminGeneralSettings
      description: 需要 `admin.access` 权限。返回数据库持久配置与环境默认值合并后的运行时通用配置。
      responses:
        '200':
          description: 通用配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminGeneralSettingsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      tags: [Admin]
      summary: 更新管理员通用配置
      operationId: updateAdminGeneralSettings
      description: |
        需要 `admin.access` 权限。保存后会写入 `system_settings` 并更新进程内运行时配置。
        SMTP 密码和大模型 API key 读取时不返回明文；更新时空值会保留已保存值，只有对应 clear 标志为 true 时才清空。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminGeneralSettings'
      responses:
        '200':
          description: 更新后的通用配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminGeneralSettingsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/settings/general/test-email:
    post:
      tags: [Admin]
      summary: 发送管理员 SMTP 测试邮件
      operationId: sendAdminGeneralSettingsTestEmail
      description: |
        需要 `admin.access` 权限。使用当前运行时 SMTP 配置向指定收件人发送测试邮件。
        请求体可以携带未保存的 SMTP 草稿字段；测试时会把这些字段覆盖到数据库持久配置与环境默认值合并后的运行时配置上，但不会持久化。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminGeneralSettingsTestEmailRequest'
      responses:
        '200':
          description: 测试邮件已发送
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminGeneralSettingsTestEmailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          description: SMTP 发件器不可用或未配置完整
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/settings/general/test-llm:
    post:
      tags: [Admin]
      summary: 测试管理员大模型配置
      operationId: testAdminGeneralSettingsLLM
      description: |
        需要 `admin.access` 权限。使用请求体中的 OpenAI/Anthropic 兼容配置发起一次最小模型调用，不保存配置。
        `llm_api_key` 为空时会复用已保存密钥；只有 `llm_api_key_clear` 为 true 时才按清空密钥测试。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminGeneralSettingsUpdate'
      responses:
        '200':
          description: 大模型连接测试通过
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminGeneralSettingsLLMTestResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '502':
          description: 大模型服务不可用或返回无效响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: 大模型配置未启用或不完整
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/database/export:
    get:
      tags: [Admin]
      summary: 导出主机、主机分组和凭据数据
      operationId: exportAdminDatabase
      description: |
        需要 `admin.database.manage` 权限。导出 JSON 覆盖 `host_groups`、`credentials` 和 `hosts`。
        凭据字段保持加密密文，不导出明文密码、私钥或 passphrase；导入目标实例必须配置可解密备份中 `key_version` 的凭据密钥。
      responses:
        '200':
          description: 数据库备份 JSON
          headers:
            Content-Disposition:
              description: 下载文件名，格式为 `online-ssh-database-YYYYMMDD-HHMMSS.json`。
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDatabaseBackup'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/database/import:
    post:
      tags: [Admin]
      summary: 导入主机、主机分组和凭据数据
      operationId: importAdminDatabase
      description: |
        需要 `admin.database.manage` 权限。导入 JSON 时会跳过重复项：
        主机分组按 `user_id + name` 去重，凭据按 `user_id + content_hash` 去重，主机按 `user_id + host + port + username` 去重。
        导入会把备份中的分组和凭据引用映射到当前数据库已有或新建记录。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminDatabaseBackup'
      responses:
        '200':
          description: 导入结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDatabaseImportResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/connections/quick-connect:
    post:
      tags: [Connections]
      summary: 事务式快速连接
      operationId: quickConnect
      description: 在同一个事务内创建或复用凭据并创建主机；真实终端会话仍通过 `/api/terminal/sessions` 创建。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuickConnectRequest'
      responses:
        '201':
          description: 主机与凭据已准备好
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuickConnectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/connections/temporary:
    post:
      tags: [Connections]
      summary: 创建临时文件管理器连接
      operationId: createTemporaryConnection
      description: |
        创建只保存在当前后端进程内的临时主机连接，用于快速连接到文件管理器。
        该接口不会创建或更新持久化的主机、凭据或终端会话记录；服务重启后临时连接失效。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemporaryConnectionRequest'
      responses:
        '201':
          description: 临时主机连接已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemporaryConnectionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/credentials:
    get:
      tags: [Credentials]
      summary: 获取当前用户的凭据列表
      operationId: listCredentials
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: auth_type
          schema:
            $ref: '#/components/schemas/AuthType'
      responses:
        '200':
          description: 凭据列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialListResponse'
    post:
      tags: [Credentials]
      summary: 创建凭据
      operationId: createCredential
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCredentialRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/credentials/keypairs:
    post:
      tags: [Credentials]
      summary: 生成 SSH 密钥对
      operationId: generateCredentialKeyPair
      description: 在服务端生成用于私钥凭据的 SSH 密钥对，返回 OpenSSH 私钥、公钥 authorized_keys 行和可复制的部署命令。生成结果不会自动保存为凭据。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateCredentialKeyPairRequest'
      responses:
        '201':
          description: 密钥对已生成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratedCredentialKeyPairResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/credentials/{credentialId}:
    get:
      tags: [Credentials]
      summary: 获取凭据详情
      operationId: getCredential
      parameters:
        - $ref: '#/components/parameters/CredentialId'
      responses:
        '200':
          description: 凭据详情（不返回明文密钥/密码）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Credentials]
      summary: 更新凭据
      operationId: updateCredential
      parameters:
        - $ref: '#/components/parameters/CredentialId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCredentialRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Credentials]
      summary: 删除凭据
      operationId: deleteCredential
      parameters:
        - $ref: '#/components/parameters/CredentialId'
      responses:
        '204':
          description: 删除成功
        '404':
          $ref: '#/components/responses/NotFound'

  /api/hosts:
    get:
      tags: [Hosts]
      summary: 获取主机列表
      operationId: listHosts
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: keyword
          schema:
            type: string
        - in: query
          name: favorite_only
          schema:
            type: boolean
        - in: query
          name: group_id
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 主机列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostListResponse'
    post:
      tags: [Hosts]
      summary: 创建主机
      operationId: createHost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHostRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/hosts/{hostId}:
    get:
      tags: [Hosts]
      summary: 获取主机详情
      operationId: getHost
      parameters:
        - $ref: '#/components/parameters/HostId'
      responses:
        '200':
          description: 主机详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Hosts]
      summary: 更新主机
      operationId: updateHost
      parameters:
        - $ref: '#/components/parameters/HostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHostRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Hosts]
      summary: 删除主机
      operationId: deleteHost
      parameters:
        - $ref: '#/components/parameters/HostId'
      responses:
        '204':
          description: 删除成功
        '404':
          $ref: '#/components/responses/NotFound'

  /api/hosts/{hostId}/metrics:
    get:
      tags: [Hosts]
      summary: 获取远程主机运行监控与系统信息
      operationId: getHostMetrics
      parameters:
        - in: path
          name: hostId
          required: true
          schema:
            type: string
            description: 持久主机 UUID 或 `/api/connections/temporary` 返回的 `tmp-host-*`。
      responses:
        '200':
          description: 主机运行监控信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostMetricsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: 主机指纹未确认或发生变化
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostFingerprintConflictResponse'

  /api/hosts/{hostId}/test:
    post:
      tags: [Hosts]
      summary: 测试主机连接
      operationId: testHostConnection
      parameters:
        - in: path
          name: hostId
          required: true
          schema:
            type: string
            description: 持久主机 UUID 或 `/api/connections/temporary` 返回的 `tmp-host-*`。
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestHostRequest'
      responses:
        '200':
          description: 测试成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestHostResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: 主机指纹未确认或发生变化
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostFingerprintConflictResponse'

  /api/hosts/{hostId}/fingerprint/confirm:
    post:
      tags: [Hosts]
      summary: 确认并保存主机指纹
      operationId: confirmHostFingerprint
      parameters:
        - $ref: '#/components/parameters/HostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmFingerprintRequest'
      responses:
        '200':
          description: 指纹已确认
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostFingerprintResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/host-groups:
    get:
      tags: [Hosts]
      summary: 获取主机分组列表
      operationId: listHostGroups
      responses:
        '200':
          description: 主机分组列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostGroupListResponse'
    post:
      tags: [Hosts]
      summary: 创建主机分组
      operationId: createHostGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveHostGroupRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostGroupResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/host-groups/{groupId}:
    put:
      tags: [Hosts]
      summary: 更新主机分组
      operationId: updateHostGroup
      parameters:
        - in: path
          name: groupId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveHostGroupRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostGroupResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Hosts]
      summary: 删除主机分组
      description: 删除分组时不会删除主机，关联主机会自动变为未分组。
      operationId: deleteHostGroup
      parameters:
        - in: path
          name: groupId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 删除成功
        '404':
          $ref: '#/components/responses/NotFound'

  /api/files/list:
    get:
      tags: [Files]
      summary: 列出远程目录
      operationId: listRemoteFiles
      parameters:
        - in: query
          name: host_id
          required: true
          schema:
            type: string
            description: 持久主机 UUID 或 `/api/connections/temporary` 返回的 `tmp-host-*`。
        - in: query
          name: path
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 5000
            default: 200
        - in: query
          name: cursor
          schema:
            type: string
      responses:
        '200':
          description: 目录内容
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/files/search:
    get:
      tags: [Files]
      summary: 在当前目录下搜索文件/文件夹
      operationId: searchRemoteFiles
      parameters:
        - in: query
          name: host_id
          required: true
          schema:
            type: string
            description: 持久主机 UUID 或 `/api/connections/temporary` 返回的 `tmp-host-*`。
        - in: query
          name: base_path
          required: true
          schema:
            type: string
        - in: query
          name: keyword
          required: true
          schema:
            type: string
        - in: query
          name: recursive
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: 搜索结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileSearchResponse'

  /api/files/search-tasks:
    post:
      tags: [Files]
      summary: 创建远程全量文件搜索任务
      description: |
        异步搜索远端目录树。第一版只匹配文件名或路径名，不读取文件内容。
        当前目录即时搜索仍由前端本地过滤承担；全量远程搜索必须显式创建任务。
      operationId: createFileSearchTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFileSearchTaskRequest'
      responses:
        '201':
          description: 搜索任务已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileSearchTaskResponse'
        '400':
