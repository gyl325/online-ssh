            application/json:
              schema:
                $ref: '#/components/schemas/FileOperationResponse'

  /api/files/copy:
    post:
      tags: [Files]
      summary: 复制远程文件或目录
      description: 在远端主机上复制文件或目录，不经过本地下载。
      operationId: copyRemotePath
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CopyFileRequest'
