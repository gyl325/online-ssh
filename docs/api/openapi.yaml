          type: integer
          minimum: 1
        auth_email_code_max_attempts:
          type: integer
          minimum: 1
        auth_email_code_resend_cooldown_seconds:
          type: integer
          minimum: 1
        auth_email_code_email_window_minutes:
          type: integer
          minimum: 1
        auth_email_code_email_window_max_sends:
          type: integer
          minimum: 1
