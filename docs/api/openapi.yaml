          type: string
          maxLength: 120
          description: 可选当前终端标签，仅作为非敏感上下文。
        shell_hint:
          type: string
          maxLength: 80
          description: 可选 shell 类型提示。
        working_directory:
          type: string
          maxLength: 512
          description: 可选当前工作目录提示。
        system_info:
          type: string
          maxLength: 1000
          description: 可选当前激活主机系统信息，例如主机名、操作系统名称和内核版本。

