  /api/files/archive/compress:
    post:
      tags: [Files]
      summary: 压缩远程目录
      description: |
        使用远端主机上的 `tar` 或 `zip` 压缩目录。当前支持 `.tar.gz`, `.tgz`, `.tar`, `.zip`。
        如果未传 `output_path`，默认输出为 `<path>.tar.gz`。
      operationId: compressRemoteDirectory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompressArchiveRequest'
      responses:
        '200':
          description: 压缩成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileOperationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: 输出文件已存在

  /api/files/archive/extract:
    post:
      tags: [Files]
      summary: 解压远程压缩包
      description: |
        在远端主机上解压常见压缩包。当前支持 `.tar`, `.tar.gz`, `.tgz`, `.tar.bz2`, `.tbz2`, `.tar.xz`, `.txz`, `.zip`。
        如果未传 `target_path`，默认解压到压缩包所在目录。
      operationId: extractRemoteArchive
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtractArchiveRequest'
      responses:
        '200':
          description: 解压成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileOperationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/files/content:
    get:
      tags: [Files]
      summary: 读取远程文本文件内容
      description: |
        第一阶段当前仅支持保守版文本读取：
        - 仅支持 UTF-8 文本文件
        - 文件大小上限为 1 MiB
        - 目录、二进制文件和超大文件会返回 `400 BAD_REQUEST`
      operationId: readRemoteFileContent
      parameters:
        - in: query
          name: host_id
          required: true
          schema:
            type: string
            description: 持久主机 UUID 或 `/api/connections/temporary` 返回的 `tmp-host-*`。
        - in: query
          name: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 文件内容
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileContent'
        '400':
          $ref: '#/components/responses/BadRequest'
    put:
      tags: [Files]
      summary: 保存远程文本文件内容
      description: |
        第一阶段当前仅支持保守版文本保存：
        - 仅支持 UTF-8 文本文件
        - 文件大小上限为 1 MiB
        - 服务端使用远端临时文件 + 原子 rename 覆盖保存
      operationId: writeRemoteFileContent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WriteFileContentRequest'
      responses:
        '200':
          description: 保存后的文件内容
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileContent'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/files/download:
    post:
      tags: [Files]
      summary: 创建远程文件下载任务
      operationId: createDownloadTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDownloadTaskRequest'
      responses:
        '202':
          description: 下载任务已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferTaskResponse'

  /api/transfers/upload/init:
    post:
      tags: [Transfers]
      summary: 初始化上传任务
      operationId: initUploadTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitUploadRequest'
      responses:
        '200':
          description: 初始化成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitUploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/transfers/upload/{taskId}/chunk:
    patch:
      tags: [Transfers]
      summary: 上传一个分片到平台暂存区
      operationId: uploadChunk
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - in: query
          name: offset
          required: true
          schema:
            type: integer
            format: int64
