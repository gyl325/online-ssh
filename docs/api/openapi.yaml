      summary: 恢复传输任务
      operationId: resumeTransferTask
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 已恢复
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferTaskResponse'

  /api/transfers/{taskId}/cancel:
    post:
      tags: [Transfers]
      summary: 取消传输任务
      operationId: cancelTransferTask
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 已取消
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferTaskResponse'

  /api/transfers/{taskId}/retry:
    post:
      tags: [Transfers]
      summary: 重试失败的传输任务
      operationId: retryTransferTask
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 已重试
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferTaskResponse'

  /api/transfers/{taskId}/content:
    get:
      tags: [Transfers]
      summary: 下载已完成的下载任务内容
      description: |
        仅当任务类型为 `download` 且任务状态为 `completed` 时可访问。
        当前第一阶段实现会直接回读平台临时文件内容。
      operationId: downloadTransferTaskContent
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 二进制文件内容
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '409':
          description: 任务尚未完成或不是下载任务
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/audit/logs:
    get:
      tags: [Audit]
      summary: 查询操作审计日志
      operationId: listAuditLogs
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: event_type
          schema:
            type: string
        - in: query
          name: target_host_id
          schema:
            type: string
            format: uuid
        - in: query
          name: result
          schema:
            $ref: '#/components/schemas/AuditResult'
        - in: query
          name: start_time
          schema:
            type: string
            format: date-time
        - in: query
          name: end_time
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: 审计日志列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'

  /api/audit/logs/{logId}:
    get:
      tags: [Audit]
      summary: 查询单条审计日志详情
      operationId: getAuditLog
      parameters:
        - in: path
          name: logId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 审计日志详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/audit/exports:
    post:
      tags: [Audit]
      summary: 创建审计日志异步导出任务
      description: |
        按当前筛选条件创建后端 CSV 导出任务。第一版最多导出 100,000 行，单个用户最多保留 3 个 pending/running 任务。
      operationId: createAuditExport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuditExportRequest'
      responses:
        '201':
          description: 导出任务已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditExportTaskResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: 当前用户已有过多进行中的导出任务
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags: [Audit]
      summary: 查询当前用户审计导出任务
      operationId: listAuditExports
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 审计导出任务列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditExportTaskListResponse'

  /api/audit/exports/{exportId}:
    get:
      tags: [Audit]
      summary: 查询单个审计导出任务
      operationId: getAuditExport
      parameters:
        - $ref: '#/components/parameters/ExportId'
      responses:
        '200':
          description: 审计导出任务详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditExportTaskResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Audit]
      summary: 删除已结束的审计导出任务
      description: pending/running 任务不能删除，应先取消；completed/failed/canceled 任务可删除。
      operationId: deleteAuditExport
      parameters:
        - $ref: '#/components/parameters/ExportId'
      responses:
        '204':
          description: 导出任务已删除
        '409':
          description: 导出任务仍在进行中
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/audit/exports/{exportId}/download:
    get:
      tags: [Audit]
      summary: 下载已完成的审计导出 CSV
      operationId: downloadAuditExport
      parameters:
        - $ref: '#/components/parameters/ExportId'
      responses:
        '200':
          description: CSV 文件内容
          content:
            text/csv:
              schema:
                type: string
        '409':
          description: 导出任务尚未完成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '410':
          description: 导出结果已过期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/audit/exports/{exportId}/cancel:
    post:
      tags: [Audit]
      summary: 取消审计导出任务
      operationId: cancelAuditExport
      parameters:
        - $ref: '#/components/parameters/ExportId'
      responses:
        '200':
          description: 导出任务已取消或返回当前状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditExportTaskResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/terminal/sessions:
    get:
      tags: [Terminal]
      summary: 列出当前可恢复终端会话
      description: |
        返回当前登录用户在当前后端进程内仍被托管、可重新 attach 的 terminal runtime。
        该接口只反映进程内 runtime 状态；后端服务重启后不会恢复旧 PTY。
      operationId: listRecoverableTerminalSessions
      responses:
        '200':
          description: 当前可恢复终端会话列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalSessionListResponse'
    post:
      tags: [Terminal]
      summary: 初始化终端会话
      description: |
        创建终端会话记录，并返回前端建立 WebSocket 所需的连接信息。
        终端 WebSocket 需要同时携带登录 session cookie 和短生命周期 attach token，
        实际终端输入输出通过 WebSocket 进行，例如：
        `wss://api.example.com/ws/terminal?session_id=...&rows=36&cols=120&attach_token=...`
      operationId: createTerminalSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTerminalSessionRequest'
      responses:
        '201':
          description: 终端会话已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTerminalSessionResponse'
        '409':
          description: 主机指纹未确认或发生变化
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostFingerprintConflictResponse'
        '429':
          description: 当前用户或全局 terminal runtime 托管数量已达到服务端配置上限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/terminal/sessions/quick-connect:
    post:
      tags: [Terminal]
      summary: 创建临时快速连接终端会话
      operationId: createQuickTerminalSession
      description: |
        使用请求中的连接材料直接创建终端会话。该接口不会保存主机或凭据资源，
        也不会写入 `terminal_sessions` 或 `terminal_recordings` 表；临时会话只在当前后端进程中有效。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQuickTerminalSessionRequest'
      responses:
        '201':
          description: 临时终端会话已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTerminalSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: 主机指纹未确认或发生变化
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostFingerprintConflictResponse'
        '429':
          description: 当前用户或全局 terminal runtime 托管数量已达到服务端配置上限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/terminal/sessions/{sessionId}:
    get:
      tags: [Terminal]
      summary: 查询终端会话
      operationId: getTerminalSession
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            description: 持久终端会话为 UUID；不保存资源的快速连接会话使用 `tmp-session-*` 临时 ID。
      responses:
        '200':
          description: 会话详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalSessionResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/terminal/sessions/{sessionId}/keepalive:
    post:
      tags: [Terminal]
      summary: 设置终端后台保活
      description: |
        设置当前进程内托管的 terminal runtime 是否启用延长保活。
        默认 WebSocket 断开后会进入 detached 托管状态，超过 1 小时未重连会关闭。
        启用 keepalive 后，当前实现会把托管有效期延长到服务端配置的保活窗口。
      operationId: setTerminalSessionKeepAlive
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            description: 持久终端会话为 UUID；不保存资源的快速连接会话使用 `tmp-session-*` 临时 ID。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetTerminalKeepAliveRequest'
      responses:
        '200':
          description: 设置成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalSessionResponse'
        '409':
          description: 当前服务进程内没有可保活的 terminal runtime
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/terminal/sessions/{sessionId}/close:
    post:
      tags: [Terminal]
      summary: 显式关闭终端会话
      description: |
        关闭后端托管的 SSH session / PTY / WebSocket runtime，并将 terminal session 标记为 disconnected。
        前端关闭终端标签时应调用该接口；单纯刷新页面不应调用该接口。
      operationId: closeTerminalSession
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            description: 持久终端会话为 UUID；不保存资源的快速连接会话使用 `tmp-session-*` 临时 ID。
      responses:
        '200':
          description: 关闭成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalSessionResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/terminal/sessions/{sessionId}/share:
    get:
      tags: [Terminal]
      summary: 查询当前终端会话的活跃分享
      operationId: getActiveTerminalShare
      description: 返回当前登录用户指定单个 terminal session 的活跃只读分享；不查询 split workspace。
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 活跃分享
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalShareResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Terminal]
      summary: 创建只读终端分享
      operationId: createTerminalShare
      description: |
        为当前登录用户的单个 terminal session 创建临时只读分享。
        服务端生成高强度随机 token，并保存 token hash 与用于管理端持续展示链接的公开 token；可设置过期时间、访问次数限制、可选密码和面向观看者的说明信息。
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTerminalShareRequest'
      responses:
        '201':
          description: 分享已创建；明文 token 和 URL 只在本响应返回
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTerminalShareResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/terminal/shares/open:
    post:
      tags: [Terminal]
      summary: 打开公开终端分享
      operationId: openTerminalShareAccess
      security: []
      description: |
        公开访问入口。使用分享 token 和可选密码换取短期 viewer token 与只读 WebSocket URL。
        成功访问会增加访问次数并写入 `terminal_share_access_logs`。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenTerminalShareAccessRequest'
      responses:
        '200':
          description: 分享访问已授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenTerminalShareAccessResponse'
        '401':
          description: 分享密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 分享不存在、已撤销或已过期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: 访问次数已达到上限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/terminal/shares/{shareId}:
    patch:
      tags: [Terminal]
      summary: 延长终端分享有效期
      operationId: extendTerminalShare
      parameters:
        - in: path
          name: shareId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtendTerminalShareRequest'
      responses:
        '200':
          description: 分享已续期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalShareResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Terminal]
      summary: 撤销终端分享
      operationId: revokeTerminalShare
      parameters:
        - in: path
          name: shareId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 分享已撤销
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalShareResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/terminal/shares/{shareId}/access-logs:
    get:
      tags: [Terminal]
      summary: 查看终端分享访问日志
      operationId: listTerminalShareAccessLogs
      parameters:
        - in: path
          name: shareId
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 分享访问日志列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalShareAccessLogListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/terminal/command-assistant/generate:
    post:
      tags: [Terminal]
      summary: 使用大模型生成终端命令
      operationId: generateTerminalCommand
      description: |
        根据用户自然语言输入生成一条结构化终端命令。请求不会携带终端输出内容；生成结果只用于展示、编辑、写入输入行或导入常用命令，不会自动执行。
        请求可选择携带当前激活主机的系统信息，帮助模型区分 Ubuntu、CentOS 等不同发行版命令差异。
        如果用户请求与终端命令生成无关，接口仍返回 200，并通过 `unsupported_request` 和 `refusal_message` 表示没有可执行命令。
        如果大模型返回了内容但后端无法解析为结构化命令，接口仍返回 200，并在 `raw_response` 中带回模型原始文本供前端展示。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerminalCommandAssistantRequest'
      responses:
        '200':
          description: 命令生成结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalCommandAssistantResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          description: 大模型服务不可用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: 大模型命令助手未配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/terminal/settings:
    get:
      tags: [Terminal]
      summary: 获取终端历史设置
      operationId: getTerminalRecordingSettings
      responses:
        '200':
          description: 终端历史设置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalRecordingSettingsResponse'
    put:
      tags: [Terminal]
      summary: 更新终端历史设置
      operationId: updateTerminalRecordingSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerminalRecordingSettings'
      responses:
        '200':
          description: 终端历史设置已更新
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalRecordingSettingsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/terminal/recordings:
    get:
      tags: [Terminal]
      summary: 列出终端历史记录
      operationId: listTerminalRecordings
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 终端历史记录列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalRecordingListResponse'

  /api/terminal/recordings/{recordingId}:
    get:
      tags: [Terminal]
      summary: 获取终端历史记录
      operationId: getTerminalRecording
      parameters:
        - $ref: '#/components/parameters/RecordingId'
      responses:
        '200':
          description: 终端历史记录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalRecordingResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Terminal]
      summary: 删除终端历史记录
      operationId: deleteTerminalRecording
      parameters:
        - $ref: '#/components/parameters/RecordingId'
      responses:
        '204':
          description: 终端历史记录已删除
        '404':
          $ref: '#/components/responses/NotFound'

  /api/terminal/recordings/{recordingId}/bookmark:
    put:
      tags: [Terminal]
      summary: 更新终端历史书签状态
      operationId: updateTerminalRecordingBookmark
      parameters:
        - $ref: '#/components/parameters/RecordingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerminalRecordingBookmarkRequest'
      responses:
        '200':
          description: 终端历史书签状态已更新
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalRecordingResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/terminal/recordings/{recordingId}/chunks:
    get:
      tags: [Terminal]
      summary: 读取终端历史记录内容
      operationId: listTerminalRecordingChunks
      parameters:
        - $ref: '#/components/parameters/RecordingId'
        - in: query
          name: cursor
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 200
      responses:
        '200':
          description: 终端历史记录内容
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalRecordingChunkListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/saved-commands:
    get:
      tags: [Terminal]
      summary: 获取当前用户常用命令
      description: |
        返回当前登录用户保存的常用命令。第一版为用户级收藏，不绑定具体主机，
        前端只提供复制入口，不自动写入或执行命令。
      operationId: listSavedCommands
      responses:
        '200':
          description: 常用命令列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedCommandListResponse'
    post:
      tags: [Terminal]
      summary: 创建常用命令
      operationId: createSavedCommand
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveCommandRequest'
      responses:
        '201':
          description: 常用命令已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedCommandResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/saved-commands/{commandId}:
    put:
      tags: [Terminal]
      summary: 更新常用命令
      operationId: updateSavedCommand
      parameters:
        - $ref: '#/components/parameters/CommandId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveCommandRequest'
      responses:
        '200':
          description: 常用命令已更新
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedCommandResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Terminal]
      summary: 删除常用命令
      operationId: deleteSavedCommand
      parameters:
        - $ref: '#/components/parameters/CommandId'
      responses:
        '204':
          description: 常用命令已删除
        '404':
          $ref: '#/components/responses/NotFound'

  /ws/terminal:
    get:
      tags: [Terminal]
      summary: 建立终端 WebSocket 流
      description: |
        该接口会升级为 WebSocket 连接。
        当前语义：
        - 使用登录 session cookie 鉴权
        - 必须携带 `session_id` 和短生命周期 `attach_token`；token 校验通过后可兼容 Host 重写反代导致的 Origin 不匹配
        - 无 `Origin` 的非浏览器客户端允许连接
        - 可选携带 `rows` / `cols`
        - 可选携带 `cwd`，仅在创建新 SSH runtime 时作为初始工作目录执行 `cd`
        - 若客户端请求 `Sec-WebSocket-Protocol: terminal.v1`，服务端会协商该子协议
        - WebSocket 断开不会立即关闭 SSH runtime，而是进入 detached 托管状态
        - 使用同一 `session_id` 重连会重新 attach 到已有 runtime
      operationId: streamTerminalSession
      parameters:
        - in: query
          name: session_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: attach_token
          required: true
          schema:
            type: string
          description: 由终端 bootstrap、可恢复会话列表或单会话查询返回的短生命周期 attach token。
        - in: query
          name: rows
          required: false
          schema:
            type: integer
            minimum: 5
            maximum: 200
            default: 36
        - in: query
          name: cols
          required: false
          schema:
            type: integer
            minimum: 20
            maximum: 400
            default: 120
        - in: query
          name: cwd
          required: false
          schema:
            type: string
            maxLength: 4096
          description: 初始工作目录；若 runtime 已存在，重新 attach 时会忽略该参数。
      responses:
        '101':
          description: WebSocket 升级成功
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          description: 当前用户或全局 terminal runtime 托管数量已达到服务端配置上限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ws/terminal/share:
    get:
      tags: [Terminal]
      summary: 建立只读终端分享 WebSocket 流
      operationId: streamTerminalShare
      security: []
      description: |
        公开只读观看者 WebSocket。客户端必须先调用 `/api/terminal/shares/open` 获取短期 `viewer_token`。
        浏览器请求默认校验 `Origin` 与后端看到的公开 origin 一致；`viewer_token` 校验通过后，会兼容反代 Host 重写造成的 Origin 不匹配；无 `Origin` 的非浏览器客户端允许连接。
        若客户端请求 `Sec-WebSocket-Protocol: terminal-share.v1`，服务端会协商该子协议。
        服务端只广播终端输出和 ready/share_update/exit/error/pong 控制事件；除 `ping` 外的任何文本、二进制、`input` 或 `resize` 消息都会返回 `READ_ONLY_TERMINAL`，不会写入 SSH stdin。
        分享被延长时，服务端会发送 `share_update` 控制事件同步新的 `expires_at`，并按新的到期时间关闭 viewer。
      parameters:
        - in: query
          name: viewer_token
          required: true
          schema:
            type: string
      responses:
        '101':
          description: WebSocket 升级成功
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Page:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      in: query
      name: page_size
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    HostId:
      in: path
      name: hostId
      required: true
      schema:
        type: string
        format: uuid
    CredentialId:
      in: path
      name: credentialId
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      in: path
      name: taskId
      required: true
      schema:
        type: string
        format: uuid
    CommandId:
      in: path
      name: commandId
      required: true
      schema:
        type: string
        format: uuid
    ExportId:
      in: path
      name: exportId
      required: true
      schema:
        type: string
        format: uuid
    RecordingId:
      in: path
      name: recordingId
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      in: path
      name: userId
      required: true
      schema:
        type: string
        format: uuid
    SessionId:
      in: path
      name: sessionId
      required: true
      schema:
        type: string
        format: uuid
    RoleKey:
      in: path
      name: roleKey
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 50

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 未认证或会话失效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: 已认证但缺少所需权限
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: 当前操作与资源状态冲突
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: 请求或验证尝试过于频繁
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    AuthConfigResponse:
      type: object
      required: [allow_registration, host_connectivity_poll_interval_seconds, email_code_length]
      properties:
        allow_registration:
          type: boolean
          description: 是否允许匿名用户注册新账号
        host_connectivity_poll_interval_seconds:
          type: integer
          minimum: 1
          description: 主机页连接状态自动检测轮询间隔，单位秒
        email_code_length:
          type: integer
          minimum: 1
          description: 邮箱验证码位数

    RegisterRequest:
      type: object
      required: [email, password, password_confirm, display_name, verification_code]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        password_confirm:
          type: string
          minLength: 8
        display_name:
          type: string
          maxLength: 100
          description: 用户名 / 显示名称，大小写不敏感唯一，可用于登录。
        verification_code:
          type: string
          minLength: 4

    LoginRequest:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
          description: 邮箱或用户名。为兼容旧客户端，服务端也接受 `email` 字段。
        email:
          type: string
          format: email
          deprecated: true
        password:
          type: string

    LoginEmailCodeRequest:
      type: object
      required: [identifier, verification_code]
      properties:
        identifier:
          type: string
          description: 邮箱或用户名。为兼容旧客户端，服务端也接受 `email` 字段。
        email:
          type: string
          format: email
          deprecated: true
        verification_code:
          type: string
          minLength: 4

    MFARequiredResponse:
      type: object
      required: [status, mfa_token, methods, expires_at]
      properties:
        status:
          type: string
          enum: [mfa_required]
        mfa_token:
          type: string
          description: 短生命周期 pending MFA token，只能用于 `/api/auth/2fa/verify`。
        methods:
          type: array
          items:
            type: string
            enum: [totp, recovery_code]
        expires_at:
          type: string
          format: date-time

    MFAStatusResponse:
      type: object
      required: [enabled, recovery_code_count]
      properties:
        enabled:
          type: boolean
        confirmed_at:
          type: string
          format: date-time
          nullable: true
        last_used_at:
          type: string
          format: date-time
          nullable: true
        recovery_code_count:
          type: integer
          minimum: 0

    MFASetupResponse:
      type: object
      required: [otpauth_url, manual_secret, qr_code]
      properties:
        otpauth_url:
          type: string
        manual_secret:
          type: string
          description: 展示给用户手动输入到身份验证器 App 的 TOTP secret；不写入日志。
        qr_code:
          type: string
          description: "data:image/png;base64,... 格式二维码。"

    MFASetupRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
          format: password
