      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: 分片接收成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadChunkResponse'
        '409':
          description: 偏移不匹配
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/transfers:
    get:
      tags: [Transfers]
      summary: 获取当前用户的传输任务列表
      operationId: listTransferTasks
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/TransferTaskStatus'
        - in: query
          name: task_type
          schema:
            $ref: '#/components/schemas/TransferTaskType'
        - in: query
          name: created_from
          schema:
            type: string
            format: date-time
          description: 仅返回创建时间不早于该时间的传输任务
        - in: query
          name: created_to
          schema:
            type: string
            format: date-time
          description: 仅返回创建时间不晚于该时间的传输任务
      responses:
        '200':
          description: 任务列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferTaskListResponse'

  /api/transfers/{taskId}:
    get:
      tags: [Transfers]
      summary: 获取单个传输任务详情
      operationId: getTransferTask
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 任务详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferTaskResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/transfers/{taskId}/pause:
    post:
      tags: [Transfers]
      summary: 暂停传输任务
      operationId: pauseTransferTask
      parameters:
        - $ref: '#/components/parameters/TaskId'
