      tags: [Files]
      summary: 新建远程空文件
      operationId: createRemoteFile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFileRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileOperationResponse'

  /api/files/rename:
    post:
      tags: [Files]
