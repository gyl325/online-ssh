<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Title}}</title>
  </head>
  <body style="margin:0;background:#f6f3ef;color:#222;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f6f3ef;padding:32px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background:#ffffff;border:1px solid #eadfd3;border-radius:18px;overflow:hidden;box-shadow:0 18px 50px rgba(97,70,43,0.12);">
            <tr>
              <td style="padding:28px 30px 8px;">
                <p style="margin:0 0 8px;color:#b26422;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;">{{.Brand}}</p>
                <h1 style="margin:0;color:#1f2933;font-size:24px;line-height:1.25;">{{.Heading}}</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 30px 8px;">
                <div style="padding:18px;border:1px solid #f0dcc8;border-radius:14px;background:#fff8f1;text-align:center;">
                  <div style="font-size:32px;line-height:1.1;font-weight:800;letter-spacing:8px;color:#b45309;font-family:'SFMono-Regular',Consolas,monospace;">{{.Code}}</div>
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:14px 30px 28px;">
                <p style="margin:0;color:#4b5563;font-size:14px;line-height:1.7;">Enter this code in {{.Brand}} to continue. It expires in <strong>{{.TTLMinutes}} minutes</strong> and can be used only once.</p>
                <p style="margin:16px 0 0;color:#8a7d70;font-size:12px;line-height:1.6;">If you did not request this code, you can ignore this email.</p>
                <p style="margin:16px 0 0;padding-top:16px;border-top:1px solid #f0e4d8;color:#9a8d80;font-size:12px;line-height:1.6;">{{.Footer}}</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
